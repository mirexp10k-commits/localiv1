<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle Interno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Consolas', monospace; }
        .login-box { max-width: 400px; margin: 15vh auto; padding: 40px; background: #1e293b; border-radius: 10px; border: 1px solid #334155; }
        .table-custom { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
        .table thead { background: #334155; }
        .table { color: #cbd5e1; margin-bottom: 0; }
        .status-online { height: 10px; width: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .badge-ip { background: #3b82f6; color: white; }
        .btn-map { background: #ef4444; border: none; font-size: 0.8rem; }
        .btn-map:hover { background: #dc2626; }
    </style>
</head>
<body>

    <!-- Overlay de Login -->
    <div id="loginSection" class="container">
        <div class="login-box text-center shadow-lg">
            <h2 class="mb-4 text-primary fw-bold"><i class="fas fa-user-shield"></i> LOGIN ADMIN</h2>
            <div class="mb-3">
                <input type="password" id="passInput" class="form-control bg-dark text-white border-secondary" placeholder="Digite a Chave de Acesso">
            </div>
            <button onclick="validaAcesso()" class="btn btn-primary w-100">AUTENTICAR</button>
        </div>
    </div>

    <!-- Conteúdo do Painel -->
    <div id="adminPanel" class="container py-5 d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold m-0"><i class="fas fa-terminal me-2"></i>LOGS DE ACESSO</h1>
                <p class="text-muted small"><span class="status-online"></span> Monitoramento em Tempo Real</p>
            </div>
            <button onclick="loadData()" class="btn btn-outline-info btn-sm">
                <i class="fas fa-sync-alt me-1"></i> Atualizar Logs
            </button>
        </div>

        <div class="table-custom shadow">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Data / Hora</th>
                            <th>IP / Localização</th>
                            <th>Dispositivo / OS</th>
                            <th>Coordenadas</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="logList">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './db.js';

        window.validaAcesso = function() {
            const pass = document.getElementById('passInput').value;
            if (pass === '9906pr') {
                document.getElementById('loginSection').classList.add('d-none');
                document.getElementById('adminPanel').classList.remove('d-none');
                loadData();
            } else {
                alert('Acesso negado!');
            }
        }

        async function loadData() {
            const { data, error } = await supabase
                .from('acessos')
                .select('*')
                .order('data_hora', { ascending: false });

            if (error) return console.error('Erro:', error);

            const container = document.getElementById('logList');
            container.innerHTML = '';

            data.forEach(log => {
                const dataFormat = new Date(log.data_hora).toLocaleString('pt-BR');
                const row = `
                    <tr>
                        <td><small>${dataFormat}</small></td>
                        <td>
                            <span class="badge badge-ip mb-1">${log.ip}</span><br>
                            <small class="text-white-50">${log.cidade}, ${log.regiao} - ${log.pais}</small>
                        </td>
                        <td>
                            <i class="fas ${log.dispositivo.includes('Janelas') ? 'fa-laptop' : 'fa-mobile-alt'} me-2"></i>
                            ${log.dispositivo}
                        </td>
                        <td><small>${log.latitude}, ${log.longitude}</small></td>
                        <td>
                            <a href="https://www.google.com/maps?q=${log.latitude},${log.longitude}" target="_blank" class="btn btn-map btn-sm text-white">
                                <i class="fas fa-map-marker-alt"></i> VER MAPA
                            </a>
                        </td>
                    </tr>
                `;
                container.innerHTML += row;
            });
        }
        
        // Expor função para o botão
        window.loadData = loadData;
    </script>
</body>
</html>
